<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>ثبت‌نام | مدیریت انبار</title>
  <?!= include('Styles'); ?>
</head>
<body>
<div class="page">
  <div class="card">
    <h2>ایجاد حساب کاربری</h2>

    <form id="signupForm">
      <div class="form-group">
        <label for="fullname">نام و نام خانوادگی</label>
        <input id="fullname" required>
      </div>

      <div class="form-group">
        <label for="username">نام کاربری</label>
        <input id="username" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">رمز عبور</label>
        <input id="password" type="password" autocomplete="new-password" required>
      </div>

      <button class="btn" type="submit">ثبت‌نام</button>
      <button class="btn btn-secondary" type="button" onclick="APP.go('Login')">بازگشت به ورود</button>
      <div id="message" class="message"></div>
    </form>
  </div>
</div>

<?!= include('Common'); ?>
<script>
document.getElementById('signupForm').addEventListener('submit', function(event) {
  event.preventDefault();

  google.script.run
    .withSuccessHandler(result => {
      if (!result.success) {
        APP.showMessage('message', result.message, 'error');
        return;
      }
      APP.showMessage('message', result.message, 'success');
      setTimeout(() => APP.go('Login'), 800);
    })
    .withFailureHandler(error => APP.showMessage('message', error.message, 'error'))
    .signUp(
      document.getElementById('fullname').value,
      document.getElementById('username').value,
      document.getElementById('password').value,
      'User'
    );
});
</script>
</body>
</html>
